version: '3.8'

services:
  wireguard-voip:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wireguard-voip
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    ports:
      - "8085:8085"
      - "51820:51820/udp"
    environment:
      - PORT=8085
      - WG_PORT=51820
      - WG_SUBNET=10.200.0.0/24
      - SERVER_IP=0.0.0.0
      - LOG_LEVEL=info
      - ZERO_RATING_ENABLED=true
      - CARRIER_API=${CARRIER_API}
    volumes:
      - wg-config:/etc/wireguard
    restart: unless-stopped
    networks:
      - wg

volumes:
  wg-config:

networks:
  wg:
    driver: bridge
