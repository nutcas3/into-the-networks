apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esl-resilience-ingress
  namespace: esl-resilience
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - esl-resilience.example.com
    secretName: esl-resilience-tls
  rules:
  - host: esl-resilience.example.com
    http:
      paths:
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: esl-resilience-service
            port:
              number: 9090
---
apiVersion: v1
kind: Secret
metadata:
  name: freeswitch-secrets
  namespace: esl-resilience
type: Opaque
data:
  password: Q2x1ZUNvbg== # ClueCon in base64
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: esl-resilience-config
  namespace: esl-resilience
data:
  config.yaml: |
    freeswitch:
      host: "freeswitch-service"
      port: 8021
    esl:
      max_retries: 10
      initial_backoff: "1s"
      max_backoff: "60s"
      buffer_size: 10000
    monitor:
      port: 9090
    logging:
      level: "info"
      format: "json"
