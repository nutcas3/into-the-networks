apiVersion: apps/v1
kind: Deployment
metadata:
  name: esl-resilience
  namespace: esl-resilience
  labels:
    app: esl-resilience
    component: server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: esl-resilience
      component: server
  template:
    metadata:
      labels:
        app: esl-resilience
        component: server
    spec:
      containers:
      - name: esl-resilience
        image: esl-resilience:latest
        ports:
        - containerPort: 9090
          name: metrics
        env:
        - name: FREESWITCH_HOST
          value: "freeswitch-service"
        - name: FREESWITCH_PORT
          value: "8021"
        - name: FREESWITCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: freeswitch-secrets
              key: password
        - name: ESL_MAX_RETRIES
          value: "10"
        - name: ESL_INITIAL_BACKOFF
          value: "1s"
        - name: ESL_MAX_BACKOFF
          value: "60s"
        - name: ESL_BUFFER_SIZE
          value: "10000"
        - name: MONITOR_PORT
          value: "9090"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /metrics
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /metrics
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: esl-resilience-service
  namespace: esl-resilience
  labels:
    app: esl-resilience
    component: server
spec:
  selector:
    app: esl-resilience
    component: server
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: esl-resilience-metrics
  namespace: esl-resilience
  labels:
    app: esl-resilience
    component: server
spec:
  selector:
    matchLabels:
      app: esl-resilience
      component: server
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
