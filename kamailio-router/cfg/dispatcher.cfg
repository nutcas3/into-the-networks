# Dispatcher configuration for load balancing
# This file defines the FreeSWITCH instances for load balancing

# Format: setid, destination, flags, priority
# setid: group ID (1 for FreeSWITCH instances)
# destination: SIP URI of the destination
# flags: 0=active, 1=disabled, 2=probing
# priority: lower number = higher priority

# FreeSWITCH instances
# These will be dynamically managed via JSON-RPC
# Initial placeholder entries:
# 1 sip:freeswitch1:5060;transport=udp 0 0
# 1 sip:freeswitch2:5060;transport=udp 0 0
# 1 sip:freeswitch3:5060;transport=udp 0 0
