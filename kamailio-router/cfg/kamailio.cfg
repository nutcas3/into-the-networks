#!KAMAILIO

####### Global Parameters ########

debug=3
log_stderror=no
log_facility=LOG_LOCAL0
fork=yes
children=4

# IP address to listen on
listen=udp:0.0.0.0:5060 advertise 0.0.0.0:5060
listen=tcp:0.0.0.0:5060 advertise 0.0.0.0:5060

# TLS support (optional)
#listen=tls:0.0.0.0:5061 advertise 0.0.0.0:5061

# Enable JSON-RPC
listen=tcp:127.0.0.1:5060

####### Loaded Modules ########

# Core modules
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "siputils.so"
loadmodule "sanity.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siptrace.so"
loadmodule "xlog.so"
loadmodule "rtpengine.so"
loadmodule "stun.so"

# Database modules
loadmodule "sqlops.so"
loadmodule "uid_gflags.so"

# Dispatcher module for load balancing
loadmodule "dispatcher.so"

# JSON-RPC module
loadmodule "jsonrpcs.so"

# NAT traversal
loadmodule "nathelper.so"
loadmodule "nat_traversal.so"

# Routing and carrier
loadmodule "drouting.so"
loadmodule "carrierroute.so"

# Topology hiding
loadmodule "topoh.so"

####### Module Parameters ########

# Dispatcher parameters
modparam("dispatcher", "db_url", "postgres://kamailio:kamailio@postgres:5432/kamailio")
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "db_mode", 0)
modparam("dispatcher", "ping_interval", 30)
modparam("dispatcher", "ping_from", "sip:kamailio@127.0.0.1")
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_probing_threshold", 3)
modparam("dispatcher", "ds_disable_state", 4)

# JSON-RPC parameters
modparam("jsonrpcs", "transport", 7)
modparam("jsonrpcs", "port", 5060)

# NAT traversal
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "sipping_bflag", 7)
modparam("nathelper", "sipping_from", "sip:pinger@kamailio")

# Registrar parameters
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "gruu_enabled", 0)

# Topology hiding
modparam("topoh", "mask_key", "toph-secret-key-change-in-production")
modparam("topoh", "mask_ip", 1)
modparam("topoh", "mask_callid", 1)

# SIP trace
modparam("siptrace", "trace_on", 0)
modparam("siptrace", "trace_mode", 4)

####### Routing Logic ########

# Request routing logic
request_route {
    # Sanity check
    if (!sanity_check("1511", "7")) {
        sl_send_reply("400", "Bad Request");
        exit;
    }

    # Check for max forwards
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # Handle OPTIONS requests
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # Handle JSON-RPC requests
    if (is_method("POST") && $ru == "127.0.0.1:5060") {
        route(JSONRPC);
        exit;
    }

    # NAT detection
    route(NATDETECT);

    # Handle REGISTER requests
    if (is_method("REGISTER")) {
        route(REGISTRAR);
        exit;
    }

    # Handle INVITE requests
    if (is_method("INVITE")) {
        route(INVITE);
        exit;
    }

    # Handle other methods
    sl_send_reply("405", "Method Not Allowed");
    exit;
}

# NAT detection route
route[NATDETECT] {
    force_rport();
    if (nat_uac_test("3")) {
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else {
            if (!has_totag()) add_contact_alias();
        }
        setflag(FLT_NATS);
    }
    return;
}

# Registrar route
route[REGISTRAR] {
    if (!save("location")) {
        sl_reply_error();
    }
    exit;
}

# INVITE handling route
route[INVITE] {
    # Apply topology hiding
    topoh_hide();

    # Dispatch to FreeSWITCH instances
    route(DISPATCHER);
}

# Dispatcher route for load balancing
route[DISPATCHER] {
    # Check if destination is in dispatcher list
    if (!ds_select_dst("1", "4")) { # group 1, algorithm 4 (round robin)
        sl_send_reply("500", "No FreeSWITCH Available");
        exit;
    }

    # Forward to selected destination
    route(RELAY);
}

# Relay route
route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# JSON-RPC route
route[JSONRPC] {
    # JSON-RPC requests are handled by the jsonrpcs module
    sl_send_reply("200", "OK");
    exit;
}

# Failure handling
failure_route[MANAGE_FAILURE] {
    route(NATDETECT);
    
    if (t_is_canceled()) {
        exit;
    }

    # Try next destination on failure
    if (ds_next_dst()) {
        t_on_failure("MANAGE_FAILURE");
        t_relay();
        exit;
    }
}

# Reply handling
reply_route {
    if (!sanity_check("1511", "7")) {
        drop;
    }

    # NAT handling for responses
    if (nat_uac_test("1")) {
        fix_nated_contact();
    }
}
