# Carrier routing configuration
# This file defines carrier-specific routing rules

# Carrier routes are managed via the drouting module
# Routes are stored in the database and can be managed via JSON-RPC

# Example carrier configuration:
# carrier_id | carrier_name | routing_table_id
# 1          | default      | 1
# 2          | carrier_a    | 2
# 3          | carrier_b    | 3

# Routing rules are defined in the database:
# - dr_rules: Defines routing rules
# - dr_gateways: Defines gateways for each carrier
# - dr_carriers: Defines carrier information

# Dynamic routing can be done via JSON-RPC:
# - dr.reload: Reload routing data
# - dr.gw_list: List gateways
# - dr.carrier_list: List carriers
