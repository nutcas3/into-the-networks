services:
  freeswitch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freeswitch
    network_mode: host
    volumes:
      - ./freeswitch/conf:/usr/local/freeswitch/conf
      - ./freeswitch/log:/usr/local/freeswitch/log
      - ./freeswitch/recordings:/usr/local/freeswitch/recordings
    environment:
      - FS_CONF_DIR=/usr/local/freeswitch/conf
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=freeswitch_cdr
      - POSTGRES_USER=freeswitch
      - POSTGRES_PASSWORD=freeswitch_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  postgres-data:
